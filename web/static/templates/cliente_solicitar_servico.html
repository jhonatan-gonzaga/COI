{% extends "base_cliente.html" %}

{% block content %}
<section class="page-heading">
    <p class="eyebrow">Solicitação de Orçamento / Serviço</p>
    <h1>Enviar solicitação para {{ profissional.nome }}</h1>
    <p class="muted">Preencha os detalhes do serviço que você precisa.</p>
</section>
<form method="post" class="form-card">
    <label>Descrição do serviço
        <textarea name="descricao" rows="5" required placeholder="Descreva o que você precisa com detalhes…"></textarea>
    </label>
    <div class="form-grid">
        <label>Data prevista
            <input type="date" name="data_prevista" required>
        </label>
        <label>Valor proposto (R$)
            <input type="number" step="0.01" min="0" name="valor" required placeholder="0,00">
        </label>
    </div>
    <div class="form-grid three">
        <label>Rua
            <input name="rua" required placeholder="Nome da rua">
        </label>
        <label>Número
            <input name="numero" required placeholder="Nº">
        </label>
        <label>Bairro
            <input name="bairro" required placeholder="Bairro">
        </label>
    </div>
    <button class="btn primary wide" type="submit">Enviar Solicitação de Serviço</button>
</form>
{% endblock %}
